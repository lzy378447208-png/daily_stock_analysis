name: 每日股票分析

on:
  # ==========================================
  # 定时触发
  # 北京时间 18:00 = UTC 10:00
  # ==========================================
  schedule:
    - cron: '0 10 * * 1-5'

  # ==========================================
  # 手动触发
  # ==========================================
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# ==========================================
# 并发控制
# ==========================================
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest

    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '50') }}

    steps:

      # ==========================================
      # 随机延迟
      # ==========================================
      - name: 随机延迟（避免接口并发风控）
        run: sleep $((RANDOM % 300))

      # ==========================================
      # 拉取代码
      # ==========================================
      - name: 检出代码
        uses: actions/checkout@v4

      # ==========================================
      # Python 环境
      # ==========================================
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ==========================================
      # 安装依赖
      # ==========================================
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==========================================
      # 创建目录
      # ==========================================
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports

      # ==========================================
      # SMTP 配置检查（新增）
      # ==========================================
      - name: 检查邮件配置
        run: |
          echo "======================================"
          echo "📧 SMTP 配置检查"
          echo "======================================"

          echo "SMTP_SERVER=$SMTP_SERVER"
          echo "SMTP_PORT=$SMTP_PORT"
          echo "SMTP_USERNAME=$SMTP_USERNAME"
          echo "EMAIL_RECEIVERS=$EMAIL_RECEIVERS"

          if [ -n "$SMTP_PASSWORD" ]; then
            echo "SMTP_PASSWORD_EXISTS=YES"
          else
            echo "SMTP_PASSWORD_EXISTS=NO"
          fi

          echo "======================================"

        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || secrets.EMAIL_SERVER }}

          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}

          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || secrets.EMAIL_SENDER }}

          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.EMAIL_PASSWORD }}

          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVER }}

      # ==========================================
      # 执行股票分析
      # ==========================================
      - name: 执行股票分析

        env:

          # ==========================================
          # AI 配置
          # ==========================================
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}

          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          LITELLM_FALLBACK_MODELS: ${{ vars.LITELLM_FALLBACK_MODELS || secrets.LITELLM_FALLBACK_MODELS }}

          AGENT_LITELLM_MODEL: ${{ vars.AGENT_LITELLM_MODEL || secrets.AGENT_LITELLM_MODEL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}

          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}

          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}

          GEMINI_REQUEST_DELAY: '3.0'

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # ==========================================
          # 数据源
          # ==========================================
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}

          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}

          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}

          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          # ==========================================
          # 股票配置
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}

          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}

          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}

          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}

          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}

          LOG_LEVEL: INFO

          # ==========================================
          # 邮件通知系统（关键修复）
          # ==========================================

          # SMTP 标准变量
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || secrets.EMAIL_SERVER }}

          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}

          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || secrets.EMAIL_SENDER }}

          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.EMAIL_PASSWORD }}

          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVER }}

          # 兼容旧版变量
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER || secrets.SMTP_SERVER }}

          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || secrets.SMTP_USERNAME }}

          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD || secrets.SMTP_PASSWORD }}

          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER || secrets.EMAIL_RECEIVERS }}

          ENABLE_EMAIL_NOTIFICATION: 'true'

          DEBUG_EMAIL: 'true'

          # ==========================================
          # 其他通知渠道
          # ==========================================
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |

          # ==========================================
          # 写入 LiteLLM 配置
          # ==========================================
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            echo "📝 写入 LiteLLM 云端配置文件..."
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
          fi

          # ==========================================
          # 运行模式
          # ==========================================
          MODE="${{ github.event.inputs.mode || 'full' }}"

          FORCE_RUN_ARG=""

          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 已启用强制运行模式"
          fi

          # ==========================================
          # 启动时间
          # ==========================================
          echo "========================================"
          echo "🚀 开始执行 A股智能分析"
          echo "⏰ 北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "========================================"

          # ==========================================
          # 执行分析
          # ==========================================
          if [ "$MODE" = "market-only" ]; then

            python main.py --market-review $FORCE_RUN_ARG

          elif [ "$MODE" = "stocks-only" ]; then

            python main.py --no-market-review $FORCE_RUN_ARG

          else

            python main.py $FORCE_RUN_ARG

          fi

      # ==========================================
      # 上传分析报告
      # ==========================================
      - name: 上传分析报告
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: analysis-reports-${{ github.run_number }}

          path: |
            reports/
            logs/

          retention-days: 30

      # ==========================================
      # 显示运行结果
      # ==========================================
      - name: 显示运行结果

        if: always()

        run: |

          echo "=========================================="
          echo "📊 任务收尾与日志回放"
          echo "=========================================="

          echo ""

          # ==========================================
          # 报告文件
          # ==========================================
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then

            echo "生成的离线报告文件列表:"
            ls -la reports/

          else

            echo "⚠️ 未生成离线报告"

          fi

          echo ""

          # ==========================================
          # 日志回放
          # ==========================================
          if [ -d "logs" ] && [ "$(ls -A logs 2>/dev/null)" ]; then

            echo "📜 最后 30 行日志:"
            tail -30 logs/*.log 2>/dev/null || true

          else

            echo "ℹ️ 未检测到日志文件"

          fi

          echo ""
          echo "✅ Workflow 执行结束"

          exit 0
